<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Dědek Jumper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen">
<h1>Dědek Jumper</h1>

<div class="menuButtons">

    <button onclick="location.href='levels.html'">
        Normal Mode
        </button>

<button onclick="startGame('challenge')">
Challenge Mode
</button>

<button onclick="location.href='shop.html'">
Shop
</button>

<button id="editorBtn" style="display:none" onclick="location.href='editor.html'">
Level Editor
</button>

</div>
</div>

<script>
// Show editor button if editor role
if (localStorage.getItem('oldFartJumper_editor') === 'true') {
  document.getElementById('editorBtn').style.display = '';
}
// Ctrl+Shift+E to toggle editor mode
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key === 'E') {
    const isEditor = localStorage.getItem('oldFartJumper_editor') === 'true';
    localStorage.setItem('oldFartJumper_editor', isEditor ? 'false' : 'true');
    document.getElementById('editorBtn').style.display = isEditor ? 'none' : '';
    e.preventDefault();
  }
});
</script>

</body>
</html>
