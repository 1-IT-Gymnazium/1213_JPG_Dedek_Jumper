<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Dědek Jumper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen">
<h1>Dědek Jumper</h1>

<div class="menuButtons">

    <button onclick="location.href='levels.html'">
        Normal Mode
        </button>

<button onclick="startGame('challenge')">
Challenge Mode
</button>

<button onclick="location.href='shop.html'">
Shop
</button>

<button id="editorBtn" style="display:none" onclick="location.href='editor.html'">
Level Editor
</button>

<button id="testerBtn" style="display:none;background:rgba(255,215,0,0.9);" onclick="location.href='shop.html?tester=1'">
Tester Mode (Shop)
</button>

</div>
</div>

<script>
// Show editor button if editor role
if (localStorage.getItem('oldFartJumper_editor') === 'true') {
  document.getElementById('editorBtn').style.display = '';
}
// Show tester button if tester mode
if (localStorage.getItem('oldFartJumper_tester') === 'true') {
  document.getElementById('testerBtn').style.display = '';
}
// Ctrl+Shift+E to toggle editor mode
// Ctrl+Shift+T to toggle tester mode (infinite coins)
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'E') {
    const isEditor = localStorage.getItem('oldFartJumper_editor') === 'true';
    localStorage.setItem('oldFartJumper_editor', isEditor ? 'false' : 'true');
    document.getElementById('editorBtn').style.display = isEditor ? 'none' : '';
    e.preventDefault();
  }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'R') {
    e.preventDefault();
    if (confirm('Reset all coins and items?')) {
      localStorage.setItem('oldFartJumper_save', JSON.stringify({ coins: 0, items: [] }));
      localStorage.removeItem('oldFartJumper_testerSave');
      location.reload();
    }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
    const isTester = localStorage.getItem('oldFartJumper_tester') === 'true';
    localStorage.setItem('oldFartJumper_tester', isTester ? 'false' : 'true');
    document.getElementById('testerBtn').style.display = isTester ? 'none' : '';
    e.preventDefault();
  }
});
</script>

</body>
</html>
