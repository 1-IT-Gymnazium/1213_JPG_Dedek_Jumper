<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Výběr levelu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <button onclick="location.href='game.html?level=0'">Tutorial</button>
    <button onclick="location.href='game.html?level=1'">1</button>
    <button onclick="location.href='game.html?level=2'">2</button>
    <button onclick="location.href='game.html?level=3'">3</button>
    <button onclick="location.href='game.html?level=4'">4</button>
    <button onclick="location.href='game.html?level=5'">5</button>
<div id="startScreen">
  <h1>Vyber Level</h1>

  <div class="menuButtons" style="flex-direction: row; flex-wrap: wrap; max-width: 600px; justify-content: center;">

    <script>
      for (let i = 1; i <= 10; i++) {
        document.write(`
          <button onclick="location.href='game.html?level=${i}'"
            style="width:100px;height:100px;font-size:30px;">
            ${i}
          </button>
        `);
      }
    </script>

  </div>

  <br>

  <button onclick="location.href='shop.html'">
    Shop
  </button>

  <button onclick="location.href='index.html'">
    Zpet do menu
  </button>
</div>

</body>
</html>
