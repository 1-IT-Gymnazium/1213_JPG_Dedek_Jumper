<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Výběr levelu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="startScreen">
  <h1>Vyber Level</h1>

  <div class="menuButtons" style="flex-direction: row; flex-wrap: wrap; max-width: 600px; justify-content: center;">
  </div>

  <script src="levels.js"></script>
  <script>
    const container = document.querySelector('.menuButtons');
    let customLevels = [];
    try {
      customLevels = JSON.parse(localStorage.getItem('oldFartJumper_customLevels')) || [];
    } catch(e) {}
    const totalLevels = BUILT_IN_LEVELS.length + customLevels.length;
    for (let i = 0; i < totalLevels; i++) {
      const btn = document.createElement('button');
      btn.style.cssText = 'width:100px;height:100px;font-size:30px;';
      btn.textContent = i + 1;
      btn.onclick = () => location.href = 'game.html?level=' + i;
      container.appendChild(btn);
    }
  </script>

  <br>

  <button onclick="location.href='shop.html'">
    Shop
  </button>

  <button onclick="location.href='index.html'">
    Zpet do menu
  </button>
</div>

</body>
</html>
