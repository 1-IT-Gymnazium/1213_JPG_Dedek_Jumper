<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Dědek Jumper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gameWrapper">
        <canvas id="game"></canvas>
        <img src="layout.png" class="layoutOverlay" alt="">

        <div class="ui">
            <div id="level">Lv 1</div>
            <div id="coins">0</div>
            <div id="activeItems"></div>
        </div>
        
        <div id="deathScreen">
            <div class="deathBox">
                <h2>💀 niha 💀</h2>
                <button onclick="resetGame()">Restart</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
