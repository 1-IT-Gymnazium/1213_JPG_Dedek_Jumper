<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Dědek Jumper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gameWrapper">
        <canvas id="game"></canvas>
        <!-- layout drawn on canvas now -->

        <div class="ui" style="display:none">
            <span id="level"></span>
            <span id="timer"></span>
            <span id="coins"></span>
            <span id="activeItems"></span>
        </div>
        <script>
          const _isTry = new URLSearchParams(location.search).get('mode') === 'try';
        </script>
        <button id="menuBtn" onclick="_isTry ? location.href='editor.html' : location.href='levels.html'" style="position:absolute;top:12%;left:7%;z-index:10;padding:4px 12px;font-size:12px;border:none;border-radius:4px;background:rgba(255,255,255,0.8);cursor:pointer;"></button>
        <script>document.getElementById('menuBtn').textContent = _isTry ? 'Back to Editor' : 'Menu';</script>
        
        <div id="deathScreen">
            <div class="deathBox">
                <h2>💀 Umřel jsi 💀</h2>
                <button onclick="resetGame()">Restart</button>
            </div>
        </div>
    </div>
    <script src="levels.js"></script>
    <script src="script.js"></script>
</body>
</html>
